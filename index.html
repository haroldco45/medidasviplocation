<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InmoTech Pro 2026 🇨🇴</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .card-habitacion { background: white; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; border: 1px solid #e2e8f0; position: relative; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        input:checked + .slider { background-color: #2563eb; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="p-4 pb-44">

    <header class="mb-4 flex justify-between items-end">
        <div>
            <h1 class="text-xl font-black text-slate-900">InmoTech <span class="text-blue-600">Master</span></h1>
            <p id="reloj" class="text-[10px] font-bold text-blue-800 mono uppercase"></p>
        </div>
        <div class="text-right">
            <span class="text-[10px] bg-slate-200 px-2 py-1 rounded font-bold">ESTÁNDAR COLOMBIA 2026</span>
        </div>
    </header>

    <div class="mb-4 bg-white p-3 rounded-lg border text-xs shadow-sm">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="font-bold text-slate-500 uppercase block mb-1">kWh Energía (COP)</label>
                <input type="number" id="val-kwh" value="950" oninput="calcularTodo()" class="w-full border rounded p-1">
            </div>
            <div>
                <label class="font-bold text-slate-500 uppercase block mb-1">m³ Agua (COP)</label>
                <input type="number" id="val-agua" value="4800" oninput="calcularTodo()" class="w-full border rounded p-1">
            </div>
        </div>
    </div>

    <div id="contenedor-areas"></div>

    <button onclick="agregarArea()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition flex items-center justify-center gap-2 mb-6">
        <span>+</span> AGREGAR HABITACIÓN / ÁREA
    </button>

    <footer class="fixed bottom-0 left-0 right-0 bg-slate-900 text-white p-5 shadow-2xl rounded-t-3xl">
        <div class="flex justify-between items-center">
            <div>
                <p class="text-[10px] text-slate-400 uppercase font-bold">Gasto Eléctrico Estimado (Mes)</p>
                <p class="text-2xl font-black text-green-400">$<span id="total-luz">0</span></p>
            </div>
            <button onclick="window.print()" class="bg-white text-slate-900 px-4 py-2 rounded-lg font-bold text-xs uppercase">Reporte PDF</button>
        </div>
    </footer>

    <template id="tpl-area">
        <div class="card-habitacion area-item shadow-sm">
            <button onclick="this.parentElement.remove(); calcularTodo();" class="absolute top-2 right-3 text-slate-300 font-bold">✕</button>
            
            <div class="mb-3">
                <input type="text" placeholder="Nombre del Área (Ej: Sala, Cuarto 1...)" class="w-full font-bold text-slate-800 border-none p-0 focus:ring-0 uppercase text-sm">
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <input type="number" placeholder="Largo (m)" class="largo p-2 bg-slate-50 border rounded-lg text-sm" oninput="calcularTodo()">
                <input type="number" placeholder="Ancho (m)" class="ancho p-2 bg-slate-50 border rounded-lg text-sm" oninput="calcularTodo()">
            </div>

            <div class="flex items-center justify-between bg-blue-50 p-3 rounded-xl">
                <div class="flex items-center gap-2">
                    <label class="switch">
                        <input type="checkbox" class="usa-aire" onchange="calcularTodo()">
                        <span class="slider"></span>
                    </label>
                    <span class="text-xs font-bold text-blue-900">¿Lleva Aire Acondicionado?</span>
                </div>
                <div class="text-right">
                    <span class="block text-[10px] text-blue-400 font-bold uppercase">Sugerido</span>
                    <span class="font-black text-blue-700 text-sm"><span class="btu-val">0</span> BTU</span>
                </div>
            </div>
        </div>
    </template>

    <script>
        // Reloj Colombia
        setInterval(() => {
            document.getElementById('reloj').innerText = new Date().toLocaleString('es-CO', {timeZone: 'America/Bogota'});
        }, 1000);

        function agregarArea() {
            const tpl = document.getElementById('tpl-area');
            document.getElementById('contenedor-areas').appendChild(tpl.content.cloneNode(true));
        }

        function calcularTodo() {
            let costoLuzTotal = 0;
            const kwhPrecio = parseFloat(document.getElementById('val-kwh').value) || 0;
            const areas = document.querySelectorAll('.area-item');

            areas.forEach(item => {
                const l = parseFloat(item.querySelector('.largo').value) || 0;
                const a = parseFloat(item.querySelector('.ancho').value) || 0;
                const llevaAire = item.querySelector('.usa-aire').checked;
                const m2 = l * a;

                let btu = 0;
                let costoMensualArea = 0;

                if (llevaAire && m2 > 0) {
                    // Lógica de BTU: 650 por m2 (Estándar Colombia climas cálidos)
                    btu = Math.ceil((m2 * 650) / 1000) * 1000;
                    if (btu < 9000) btu = 9000; // Mínimo comercial

                    // Estimación Consumo Eléctrico Aire:
                    // Un aire de 12.000 BTU consume aprox 1.1 kWh
                    // Ratio: BTU / 11000 = kWh aprox.
                    const consumoKwhHora = btu / 11000; 
                    // Uso estimado: 8 horas al día por 30 días
                    const kwhMes = consumoKwhHora * 8 * 30;
                    costoMensualArea = kwhMes * kwhPrecio;
                }

                item.querySelector('.btu-val').innerText = btu.toLocaleString();
                costoLuzTotal += costoMensualArea;
            });

            document.getElementById('total-luz').innerText = Math.round(costoLuzTotal).toLocaleString('es-CO');
        }

        // Agregar la primera área automáticamente
        window.onload = agregarArea;
    </script>
</body>
</html>
