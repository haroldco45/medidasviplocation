<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InmoMedidas Pro - Herramienta de Campo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .card { background: white; padding: 1.5rem; border-radius: 0.75rem; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="mb-6">
        <h1 class="text-2xl font-bold text-blue-800">InmoMedidas Pro</h1>
        <p class="text-gray-500 text-sm">Registro Técnico de Inmuebles</p>
    </header>

    <section class="card mb-6">
        <h2 class="font-semibold mb-3 border-b pb-2 text-gray-700">Información General</h2>
        <div class="grid grid-cols-1 gap-4">
            <input type="text" placeholder="Dirección / ID Propiedad" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="text" placeholder="Responsable del levantamiento" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
    </section>

    <section id="lista-ambientes" class="space-y-4">
        </section>

    <button onclick="agregarAmbiente()" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition duration-300 flex items-center justify-center gap-2">
        <span>+</span> Agregar Ambiente / Habitación
    </button>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-between items-center shadow-lg">
        <div>
            <p class="text-xs text-gray-500 uppercase font-bold">Área Total Calculada</p>
            <p class="text-2xl font-black text-blue-800"><span id="area-total">0.00</span> m²</p>
        </div>
        <button onclick="window.print()" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-semibold">
            Exportar Reporte
        </button>
    </footer>

    <template id="template-ambiente">
        <div class="card ambiente shadow-sm border-l-4 border-blue-500 relative">
            <button onclick="this.parentElement.remove(); calcularTodo();" class="absolute top-2 right-2 text-red-400 text-xl font-bold">&times;</button>
            
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div class="col-span-2">
                    <input type="text" placeholder="Nombre (Ej: Sala, Cocina...)" class="w-full font-bold text-gray-700 border-b focus:border-blue-500 outline-none p-1">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 uppercase">Largo (m)</label>
                    <input type="number" step="0.01" oninput="calcularTodo()" class="input-largo w-full p-2 border rounded bg-gray-50 focus:bg-white transition" placeholder="0.00">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 uppercase">Ancho (m)</label>
                    <input type="number" step="0.01" oninput="calcularTodo()" class="input-ancho w-full p-2 border rounded bg-gray-50 focus:bg-white transition" placeholder="0.00">
                </div>
            </div>
            
            <div class="flex justify-between items-center bg-blue-50 p-2 rounded">
                <span class="text-xs font-bold text-blue-600 uppercase">Subtotal:</span>
                <span class="font-mono font-bold text-blue-800"><span class="subtotal-area">0.00</span> m²</span>
            </div>
        </div>
    </template>

    <script>
        function agregarAmbiente() {
            const lista = document.getElementById('lista-ambientes');
            const template = document.getElementById('template-ambiente');
            const clon = template.content.cloneNode(true);
            lista.appendChild(clon);
        }

        function calcularTodo() {
            let totalGeneral = 0;
            const ambientes = document.querySelectorAll('.ambiente');

            ambientes.forEach(amb => {
                const largo = parseFloat(amb.querySelector('.input-largo').value) || 0;
                const ancho = parseFloat(amb.querySelector('.input-ancho').value) || 0;
                const subtotal = largo * ancho;
                
                amb.querySelector('.subtotal-area').innerText = subtotal.toFixed(2);
                totalGeneral += subtotal;
            });

            document.getElementById('area-total').innerText = totalGeneral.toFixed(2);
        }

        // Agregar el primer ambiente al cargar
        window.onload = agregarAmbiente;
    </script>

</body>
</html>
